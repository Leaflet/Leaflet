<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Leaflet debug page - Draw Control</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0" />
		<link rel="stylesheet" href="../../dist/leaflet.css" />
		<link rel="stylesheet" href="../css/mobile.css" />
		<script type="importmap">
			{
				"imports": {
					"leaflet": "../../dist/leaflet-src.js"
				}
			}
		</script>
	</head>
	<body>
		<div id="map"></div>
		<script type="module">
			import {LeafletMap, TileLayer, DrawControl} from 'leaflet';

			const map = new LeafletMap('map')
				.setView([51.505, -0.09], 13);

			map.addLayer(new TileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 18}));

			const drawControl = new DrawControl({
				position: 'topright',
				draw: {
					marker: true,
					polyline: true,
					polygon: true,
					circle: true
				},
				edit: {
					edit: true,
					remove: true
				}
			});

			map.addControl(drawControl);

			map.on('draw:created', function (e) {
				console.log('Shape created:', e.layerType, e.layer);
			});

			map.on('draw:deleted', function (e) {
				console.log('Shape deleted:', e.layer);
			});
		</script>
	</body>
</html>
